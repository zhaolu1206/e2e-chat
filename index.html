<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>端对端加密群聊</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔒 端对端加密群聊</h1>
            <p class="subtitle">安全、私密、实时</p>
        </header>

        <!-- 登录界面 -->
        <div id="login-screen" class="screen active">
            <div class="card">
                <h2>加入聊天室</h2>
                <div class="form-group">
                    <label for="username">你的昵称</label>
                    <input type="text" id="username" placeholder="输入你的昵称" maxlength="20" required>
                </div>
                <div class="form-group">
                    <label for="room-id">房间 ID</label>
                    <input type="text" id="room-id" placeholder="输入或创建房间 ID" maxlength="20" required>
                    <button type="button" id="generate-room" class="btn-secondary">生成随机房间 ID</button>
                </div>
                <button id="join-btn" class="btn-primary">加入聊天室</button>
            </div>
        </div>

        <!-- 聊天界面 -->
        <div id="chat-screen" class="screen">
            <div class="chat-header">
                <div class="room-info">
                    <span id="room-display">房间: <strong id="current-room"></strong></span>
                    <span id="user-display">用户: <strong id="current-user"></strong></span>
                </div>
                <button id="leave-btn" class="btn-secondary">离开房间</button>
            </div>
            
            <div class="chat-container">
                <div id="messages" class="messages"></div>
                <div class="status-bar" id="status-bar">
                    <span id="connection-status">连接中...</span>
                    <span id="peer-count">在线: 0</span>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="message-input" placeholder="输入消息..." maxlength="500" disabled>
                <button id="send-btn" class="btn-primary" disabled>发送</button>
            </div>
        </div>

        <!-- 加载提示 -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>正在连接...</p>
        </div>
    </div>

    <script type="module" src="app-improved.js"></script>
</body>
</html>
